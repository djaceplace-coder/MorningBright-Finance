<svg
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Silver/Platinum gradient for the rising sun emblem -->
    <linearGradient id="silverId" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="35%" stop-color="#cbd5e1" />
      <stop offset="50%" stop-color="#e2e8f0" />
      <stop offset="65%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Deep premium digital banking blue/midnight gradient -->
    <linearGradient id="blueId" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d2551" />
      <stop offset="30%" stop-color="#0a1d40" />
      <stop offset="100%" stop-color="#03081a" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect
    x="4"
    y="4"
    width="92"
    height="92"
    rx="24"
    fill="url(#blueId)"
    stroke="rgba(255,255,255,0.06)"
    stroke-width="1"
  />

  <!-- Rising Sun Emblem -->
  <g>
    <!-- Base Horizontal Horizon Line -->
    <line
      x1="22"
      y1="63"
      x2="78"
      y2="63"
      stroke="url(#silverId)"
      stroke-width="3.2"
      stroke-linecap="round"
    />

    <!-- Center Sun Semi-Circle -->
    <path
      d="M 37 63 A 13 13 0 0 1 63 63 Z"
      fill="url(#silverId)"
    />

    <!-- Vertical Center Ray -->
    <line
      x1="50"
      y1="45"
      x2="50"
      y2="30"
      stroke="url(#silverId)"
      stroke-width="3"
      stroke-linecap="round"
    />

    <!-- Upper Left Ray -->
    <line
      x1="42.5"
      y1="48"
      x2="33"
      y2="34"
      stroke="url(#silverId)"
      stroke-width="3"
      stroke-linecap="round"
    />

    <!-- Upper Right Ray -->
    <line
      x1="57.5"
      y1="48"
      x2="67"
      y2="34"
      stroke="url(#silverId)"
      stroke-width="3"
      stroke-linecap="round"
    />

    <!-- Far Left Ray -->
    <line
      x1="37.5"
      y1="54"
      x2="25"
      y2="47"
      stroke="url(#silverId)"
      stroke-width="3"
      stroke-linecap="round"
    />

    <!-- Far Right Ray -->
    <line
      x1="62.5"
      y1="54"
      x2="75"
      y2="47"
      stroke="url(#silverId)"
      stroke-width="3"
      stroke-linecap="round"
    />
  </g>
</svg>
